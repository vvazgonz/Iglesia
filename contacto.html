<head>

  <meta name="keywords" content="Comunidad Cristiana Maranata, Coslada, contacto, iglesia evangélica, dirección">
  <meta name="author" content="Víctor Vázquez González">
  <meta name="robots" content="index, follow">

  <!-- Open Graph -->
  <meta property="og:title" content="Contacto | Comunidad Cristiana Maranata de Coslada">
  <meta property="og:description" content="Dirección, email y horario de la Comunidad Cristiana Maranata de Coslada y San Fernando de Henares.">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="es_ES">

  <!-- Fuentes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">

  <!-- Estilos -->
  <link href="css/maranata.css?v=3" rel="stylesheet" type="text/css">
  <link href="css/contacto.css?v=3" rel="stylesheet" type="text/css">
</head>

<body>

  <!-- Navegación -->
  <nav class="Navegacion" id="nav" aria-label="Navegación principal"></nav>

  <button
    class="hamburguesa"
    onclick="toggleMenu()"
    aria-label="Abrir menú"
    aria-expanded="false"
    aria-controls="nav"
  >☰</button>

  <!-- Hero -->
  <header class="ContactoIndex">
    <h1>Visítanos</h1>
  </header>

  <!-- Contacto -->
  <main class="Contacto">

    <address class="Contacto__texto Contacto__item">
      <p>
        <em>Calle Granada 8, 28821<br>Coslada, Madrid</em>
      </p>
      <p>
        <b>Dirección de email:</b><br>
        <a href="mailto:cmmaranatacoslada@gmail.com" class="Contacto__texto-correo">
          cmmaranatacoslada@gmail.com
        </a>
      </p>
      <p>
        <b>Horario de apertura:</b><br>
        Domingos: 11:15 – 13:00
      </p>
    </address>

    <div class="Contacto__mapa Contacto__item">
      <a href="https://maps.app.goo.gl/aPxzSWpiAp6mCGGy7" target="_blank" rel="noopener noreferrer" aria-label="Ver ubicación en Google Maps">
        <img src="img/mapa.PNG" alt="Mapa de ubicación de la Comunidad Maranata en Coslada">
      </a>
    </div>

  </main>

  <!-- Pie de página -->
  <footer>
    <p>© 2024 Comunidad Cristiana Maranata de Coslada y San Fernando. Todos los derechos reservados.</p>
  </footer>

  <!-- Scripts -->
  <script src="js/generico.js?v=3"></script>
